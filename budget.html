<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Budgets | Smart Expense Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="css/style.css"><link rel="stylesheet" href="css/dashboard.css"><link rel="stylesheet" href="css/responsive.css">
</head>
<body data-app-page="budget">
  <div class="app-shell">
    <aside class="sidebar"><a class="brand" href="dashboard.html"><span class="brand-mark">S</span><span>Smart Expense</span></a><nav class="nav-list"><a href="dashboard.html"><i class="fa-solid fa-chart-pie"></i>Dashboard</a><a href="transactions.html"><i class="fa-solid fa-right-left"></i>Transactions</a><a class="active" href="budget.html"><i class="fa-solid fa-bullseye"></i>Budgets</a><a href="analytics.html"><i class="fa-solid fa-chart-line"></i>Analytics</a><a href="reports.html"><i class="fa-solid fa-file-lines"></i>Reports</a><a href="profile.html"><i class="fa-solid fa-user"></i>Profile</a><a href="settings.html"><i class="fa-solid fa-gear"></i>Settings</a><a href="index.html"><i class="fa-solid fa-right-from-bracket"></i>Logout</a></nav></aside>
    <main class="main"><header class="topbar"><div class="search"><i class="fa-solid fa-search"></i><input placeholder="Search budgets"></div><div class="nav-actions"><button class="icon-btn" data-theme-toggle><i class="fa-solid fa-moon"></i></button></div></header>
      <section class="page-pad"><div class="page-heading"><div><h1>Budget Planner</h1><p>Create monthly spending limits and track remaining budget.</p></div></div>
        <div class="grid grid-2"><div class="card panel"><h2>Monthly Budgets</h2><div data-budgets></div></div><form class="card panel form-grid" data-budget-form><h2>Create Budget</h2><div class="field"><label>Category</label><select name="category"><option>Food</option><option>Travel</option><option>Shopping</option><option>Education</option><option>Entertainment</option><option>Healthcare</option><option>Rent</option><option>Bills</option></select></div><div class="field"><label>Budget Limit</label><input name="limit" type="number" min="1" placeholder="10000" required></div><button class="btn btn-primary" type="submit">Save Budget</button></form></div>
      </section>
    </main>
  </div>
  <script src="js/storage.js"></script><script src="js/utils.js"></script><script src="js/app.js"></script><script src="js/dashboard.js"></script><script src="js/budget.js"></script>
</body>
</html>
