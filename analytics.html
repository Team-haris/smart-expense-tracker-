<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Analytics | Smart Expense Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="css/style.css"><link rel="stylesheet" href="css/dashboard.css"><link rel="stylesheet" href="css/responsive.css">
</head>
<body data-app-page="analytics">
  <div class="app-shell"><aside class="sidebar"><a class="brand" href="dashboard.html"><span class="brand-mark">S</span><span>Smart Expense</span></a><nav class="nav-list"><a href="dashboard.html"><i class="fa-solid fa-chart-pie"></i>Dashboard</a><a href="transactions.html"><i class="fa-solid fa-right-left"></i>Transactions</a><a href="budget.html"><i class="fa-solid fa-bullseye"></i>Budgets</a><a class="active" href="analytics.html"><i class="fa-solid fa-chart-line"></i>Analytics</a><a href="reports.html"><i class="fa-solid fa-file-lines"></i>Reports</a><a href="profile.html"><i class="fa-solid fa-user"></i>Profile</a><a href="settings.html"><i class="fa-solid fa-gear"></i>Settings</a><a href="index.html"><i class="fa-solid fa-right-from-bracket"></i>Logout</a></nav></aside>
    <main class="main"><header class="topbar"><div class="search"><i class="fa-solid fa-search"></i><input placeholder="Search analytics"></div><div class="nav-actions"><button class="icon-btn" data-theme-toggle><i class="fa-solid fa-moon"></i></button></div></header><section class="page-pad"><div class="page-heading"><div><h1>Analytics</h1><p>Visual spending analysis, trends, and budget insight.</p></div></div><div class="grid grid-4"><div class="card stat-card"><div><p>Monthly Expenses</p><h3 data-summary="expenses">₹0</h3></div><span class="stat-icon red"><i class="fa-solid fa-receipt"></i></span></div><div class="card stat-card"><div><p>Income</p><h3 data-summary="income">₹0</h3></div><span class="stat-icon green"><i class="fa-solid fa-wallet"></i></span></div><div class="card stat-card"><div><p>Savings</p><h3 data-summary="savings">₹0</h3></div><span class="stat-icon blue"><i class="fa-solid fa-piggy-bank"></i></span></div><div class="card stat-card"><div><p>Budget Used</p><h3>54%</h3></div><span class="stat-icon orange"><i class="fa-solid fa-gauge-high"></i></span></div></div><div class="grid grid-2" style="margin-top:20px"><div class="card panel chart-panel"><h2>Category Analysis</h2><canvas id="categoryChart"></canvas></div><div class="card panel chart-panel"><h2>Spending Trend</h2><canvas id="trendChart"></canvas></div><div class="card panel chart-panel wide-panel"><h2>Income vs Expenses vs Savings</h2><canvas id="barChart"></canvas></div></div></section></main></div>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script><script src="js/storage.js"></script><script src="js/utils.js"></script><script src="js/app.js"></script><script src="js/dashboard.js"></script><script src="js/analytics.js"></script>
</body>
</html>
