<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register | Smart Expense Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
  <main class="auth-page">
    <form class="card auth-card" data-auth-form="register">
      <a class="brand" href="index.html"><span class="brand-mark">S</span><span>Smart Expense</span></a>
      <h1>Create Account</h1>
      <p>Start building better financial habits today.</p>
      <div class="form-grid">
        <div class="field"><label>Name</label><input name="name" type="text" placeholder="Your name" required></div>
        <div class="field"><label>Email</label><input name="email" type="email" placeholder="you@example.com" required></div>
        <div class="field"><label>Phone</label><input name="phone" type="tel" placeholder="+91 98765 43210"></div>
        <div class="field"><label>Password</label><input name="password" type="password" placeholder="Create password" required></div>
        <div class="field"><label>Confirm Password</label><input name="confirmPassword" type="password" placeholder="Repeat password" required></div>
        <button class="btn btn-primary" type="submit">Create Account</button>
        <button class="btn btn-secondary" type="button"><i class="fa-brands fa-google"></i> Sign up with Google</button>
        <p>Already registered? <a href="login.html">Login</a></p>
      </div>
    </form>
  </main>
  <script src="js/storage.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
